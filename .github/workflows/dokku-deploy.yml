name: Deploy to Dokku

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: dokku-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Configure SSH key
        env:
          DOKKU_SSH_PRIVATE_KEY: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$DOKKU_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Configure known_hosts
        env:
          DOKKU_HOST: ${{ secrets.DOKKU_HOST }}
          DOKKU_PORT: ${{ secrets.DOKKU_PORT || '22' }}
          DOKKU_SSH_HOST_KEY: ${{ secrets.DOKKU_SSH_HOST_KEY }}
        run: |
          printf '[%s]:%s %s\n' "$DOKKU_HOST" "$DOKKU_PORT" "$DOKKU_SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Dokku
        uses: dokku/github-action@v1.10.0
        with:
          branch: master
          git_remote_url: ssh://dokku@${{ secrets.DOKKU_HOST }}:${{ secrets.DOKKU_PORT || '22' }}/${{ secrets.DOKKU_APP_NAME }}
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          ssh_host_key: ${{ secrets.DOKKU_SSH_HOST_KEY }}

      - name: Run database prepare
        env:
          DOKKU_APP_NAME: ${{ secrets.DOKKU_APP_NAME }}
          DOKKU_HOST: ${{ secrets.DOKKU_HOST }}
          DOKKU_PORT: ${{ secrets.DOKKU_PORT || '22' }}
        run: |
          ssh -p "$DOKKU_PORT" dokku@"$DOKKU_HOST" -- \
            dokku run "$DOKKU_APP_NAME" bundle exec rails db:prepare
