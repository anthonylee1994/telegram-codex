plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.0'
    id 'io.spring.dependency-management' version '1.1.7'
}

def sqliteNativeAccessArg = '--enable-native-access=ALL-UNNAMED'

group = 'com.telegram.codex'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

configurations {
    mockitoAgent
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.hibernate.orm:hibernate-community-dialects'
    implementation 'org.xerial:sqlite-jdbc:3.50.3.0'
    implementation 'org.jsoup:jsoup:1.18.3'
    implementation 'org.apache.poi:poi-ooxml:5.5.1'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.mockito:mockito-junit-jupiter'
    mockitoAgent('org.mockito:mockito-core') {
        transitive = false
    }
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    jvmArgs "-javaagent:${configurations.mockitoAgent.singleFile.absolutePath}"
    jvmArgs sqliteNativeAccessArg
}

tasks.withType(JavaExec).configureEach {
    jvmArgs sqliteNativeAccessArg
}

tasks.named('bootJar') {
    archiveFileName = 'telegram-codex.jar'
}
