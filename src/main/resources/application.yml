spring:
    config:
        import: optional:file:.env[.properties]
    application:
        name: telegram-codex
    datasource:
        url: jdbc:sqlite:${SQLITE_DB_PATH:./data/app.db}
        driver-class-name: org.sqlite.JDBC
    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.community.dialect.SQLiteDialect
                format_sql: true
    flyway:
        enabled: true
        baseline-on-migrate: true
    jackson:
        serialization:
            write-dates-as-timestamps: false
    threads:
        virtual:
            enabled: true
server:
    port: ${PORT:3000}
logging:
    level:
        root: INFO
app:
    base-url: ${BASE_URL:}
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    telegram-webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
    allowed-telegram-user-ids: ${ALLOWED_TELEGRAM_USER_IDS:}
    sqlite-db-path: ${SQLITE_DB_PATH:./data/app.db}
    codex-exec-timeout-seconds: ${CODEX_EXEC_TIMEOUT_SECONDS:300}
    max-media-group-images: ${MAX_MEDIA_GROUP_IMAGES:10}
    max-pdf-pages: ${MAX_PDF_PAGES:4}
    media-group-wait-ms: ${MEDIA_GROUP_WAIT_MS:1200}
    port: ${PORT:3000}
    rate-limit-window-ms: ${RATE_LIMIT_WINDOW_MS:10000}
    rate-limit-max-messages: ${RATE_LIMIT_MAX_MESSAGES:5}
    session-ttl-days: ${SESSION_TTL_DAYS:7}
